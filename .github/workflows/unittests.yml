name: unittests

on:
  pull_request:
    branches:
      - main
      - "[0-9].[0-9]"
    paths-ignore:
      - '**/*.md'
      - '**/00-RELEASENOTES'
  push:
    branches:
      - main
      - "[0-9].[0-9]"
    paths-ignore:
      - '**/*.md'
      - '**/00-RELEASENOTES'
  workflow_dispatch:

concurrency:
  group: unittests-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  cmake-tests:
    runs-on: ubuntu-latest

    steps:
    # Checkout the code from the repository
    - name: Checkout Code
      uses: actions/checkout@v3

    # Set up Docker to build and run the container
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2

    # Build the Docker image from the Dockerfile in your repo
    - name: Build Docker Image
      run: docker build -t presubmit-image -f .devcontainer/Dockerfile .

    - name: Restore ccache
      uses: actions/cache@v4
      with:
        path: .ccache
        key: ccache-unittests-${{ github.ref }}-${{ github.sha }}
        restore-keys: |
          ccache-unittests-${{ github.ref }}-
          ccache-unittests-


    - name: Run Tests
      id: test-run
      continue-on-error: true
      run: |
        mkdir -p test-results .ccache
        docker run --privileged --rm \
          --mount type=bind,source="$(pwd)/test-results",target=/workspace/test-results \
          -v "$(pwd):/workspace" \
          -e CCACHE_DIR=/workspace/.ccache \
          -e CCACHE_MAXSIZE=1G \
          --user "ubuntu:ubuntu" \
          presubmit-image \
          sudo -E ci/build_ubuntu.sh --run-tests --unittest-output=/workspace/test-results

    - name: Update Test Results Permissions
      if: always()
      run: sudo chmod -R 755 test-results

     # Upload test results as artifacts
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: unittest-results
        path: test-results

    # Fail the job if tests failed
    - name: Check Test Results
      if: steps.test-run.outcome == 'failure'
      run: exit 1
